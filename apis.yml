apis:
  - aid: givebutter:givebutter
    name: Givebutter
    description: >-
      The Givebutter API is organized around REST and provides a stateless
      interface for interacting with your Givebutter account. The Givebutter API
      supports JSON, and all requests return and require a valid JSON object.
      The API uses Bearer token authentication with API keys and provides
      endpoints for campaigns, contacts, transactions, funds, households,
      tickets, discount codes, webhooks, payouts, recurring plans, and pledges.
    humanURL: https://docs.givebutter.com/reference/reference-getting-started
